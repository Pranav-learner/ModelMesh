# ModelMesh observability stack: Prometheus (scrape + store) + Grafana
# (dashboards). The gateway itself is expected to expose /metrics on :2112 — run
# it on the host (metrics.Manager.Handler()) or add a `modelmesh` service here.
#
#   docker compose -f deploy/docker-compose.yml up -d
#   Grafana:    http://localhost:3000  (admin / admin)
#   Prometheus: http://localhost:9090
#
# To scrape a gateway running on the host, the Prometheus target `modelmesh:2112`
# resolves via the extra_hosts host-gateway mapping below.
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: modelmesh-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "modelmesh:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: modelmesh-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/gateway.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
