# Grafana dashboard provisioning — loads every ModelMesh dashboard JSON on boot.
apiVersion: 1

providers:
  - name: ModelMesh
    orgId: 1
    folder: ModelMesh
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
