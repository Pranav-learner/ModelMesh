# Prometheus scrape configuration for the ModelMesh observability stack.
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: modelmesh

scrape_configs:
  # ModelMesh gateway exposes the metrics catalog on /metrics (Manager.Handler()).
  - job_name: modelmesh
    metrics_path: /metrics
    static_configs:
      - targets: ["modelmesh:2112"]
        labels:
          service: modelmesh-gateway

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
